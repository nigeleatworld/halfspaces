<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>halfspaces</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Space Grotesk', sans-serif;
            background: #0a0a0a;
            color: #ffffff;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .container {
            padding: 2rem;
        }

        h1 {
            font-size: 1.4rem;
            font-weight: 400;
            letter-spacing: 0.15em;
            text-transform: lowercase;
            opacity: 0.5;
            margin-bottom: 2rem;
        }

        p {
            font-size: 2.4rem;
            font-weight: 600;
            letter-spacing: -0.02em;
        }

        .sign-off {
            font-size: 1rem;
            font-weight: 400;
            opacity: 0.4;
            margin-top: 1.5rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <p>watch this (half)space.</p>
        <p class="sign-off">—nigel</p>
    </div>
</body>
</html>
